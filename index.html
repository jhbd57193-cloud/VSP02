<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВСП: ТЕРМІНАЛ v6.9 (Modal Animation)</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #fbbf24; --bg: #020617; --card: rgba(30, 41, 59, 0.7); --accent: #38bdf8; --danger: #f43f5e; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Ubuntu', sans-serif; margin: 0; height: 100vh; overflow: hidden; color: #f1f5f9; background: #020617; }
        
        /* ЦЕ ТЕ, ЩО ТИ ПРОСИВ: АНІМАЦІЯ ВІКОН ЗНИЗУ ВГОРУ */
        .modal { 
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); 
            z-index: 2000; display: flex; align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none; transition: 0.4s ease-out; backdrop-filter: blur(10px); 
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        
        .modal-box { 
            width: 100%; max-width: 450px; background: #1e293b; border-radius: 30px; 
            padding: 35px; border: 2px solid var(--gold);
            /* Початкова позиція вікна - нижче екрана */
            transform: translateY(100vh);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .modal.active .modal-box { transform: translateY(0); }

        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid var(--glass); display: flex; flex-direction: column; }
        .nav-item { padding: 14px 25px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; color: #94a3b8; font-size: 13px; }
        .nav-item.active { color: var(--gold); background: rgba(251, 191, 36, 0.1); border-left: 4px solid var(--gold); }
        .main { flex: 1; padding: 30px; overflow-y: auto; background: #020617; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--glass); }
        .btn { background: var(--gold); color: #000; border: none; padding: 10px 16px; cursor: pointer; font-weight: 700; border-radius: 10px; text-transform: uppercase; font-size: 10px; }
        .btn-red { background: var(--danger); color: white; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--glass); color: #fff; border-radius: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid var(--glass); font-size: 13px; }
    </style>
</head>
<body>

    <div id="authScreen" style="position:fixed; inset:0; z-index:9999; background:#020617; display:flex; align-items:center; justify-content:center;">
        <div style="background:#1e293b; padding:45px; border-radius:35px; border:2px solid var(--gold); width:300px; text-align:center;">
            <h2 style="color:var(--gold); margin-bottom:20px;">ВСП: ТЕРМІНАЛ</h2>
            <input id="uL" placeholder="Прізвище">
            <input id="uP" type="password" placeholder="Пароль">
            <button class="btn" style="width:100%; margin-top:15px;" onclick="core.login()">Увійти</button>
        </div>
    </div>

    <div style="display:flex; height:100vh;">
        <div class="sidebar">
            <div style="padding:25px;"><h2 style="color:var(--gold); font-size:16px;">VSP SYSTEM</h2><div id="uLabel" style="font-size:11px; opacity:0.6;">...</div></div>
            <div class="nav-item active" onclick="core.nav('home', this)">🖥 Головна панель</div>
            <div class="nav-item" onclick="core.nav('sol', this)">👥 Особовий склад</div>
            <div class="nav-item" onclick="core.nav('cars', this)">🚗 Реєстр авто</div>
            <div class="nav-item" onclick="core.nav('patrol', this)">🛡 Журнал патрулів</div>
            <div class="nav-item" onclick="core.nav('crime', this)">⚠️ Порушення</div>
            <div id="admMenu" class="nav-item" style="display:none; color:var(--gold);" onclick="core.nav('adm', this)">⚙️ Адмін-панель</div>
            <div class="nav-item" style="margin-top:auto; color:var(--danger);" onclick="core.logout()">🔒 Вихід</div>
        </div>

        <div class="main">
            <div id="s-home" class="section">
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0">Панель Управління</h3>
                    <div style="display:flex; gap:8px;">
                        <button class="btn" onclick="core.openM('m-patrol')">✚ ПАТРУЛЬ</button>
                        <button class="btn" onclick="core.openM('m-car')">✚ АВТО</button>
                        <button class="btn" onclick="core.openM('m-crime')">✚ ПОРУШЕННЯ</button>
                        <button class="btn btn-red" onclick="core.openM('m-criminal')">✚ КП</button>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                    <div class="card">АВТО <b id="v1" style="display:block; font-size:28px; color:var(--accent)">0</b></div>
                    <div class="card">БІЙЦІ <b id="v2" style="display:block; font-size:28px; color:var(--gold)">0</b></div>
                    <div class="card">ПАТРУЛІ <b id="v3" style="display:block; font-size:28px; color:#a855f7">0</b></div>
                    <div class="card">ПОРУШЕННЯ <b id="v4" style="display:block; font-size:28px; color:#facc15">0</b></div>
                    <div class="card">КРИМІНАЛЬНІ КП <b id="v5" style="display:block; font-size:28px; color:var(--danger)">0</b></div>
                </div>
            </div>

            </div>
    </div>

    <div id="m-patrol" class="modal"><div class="modal-box"><h3>Звіт патруля</h3><input id="p1" placeholder="Склад"><textarea id="p2" placeholder="Опис"></textarea><button class="btn" style="width:100%" onclick="core.save('patrol')">Зберегти</button><button class="btn" style="background:transparent; color:#64748b; width:100%; margin-top:10px;" onclick="core.cls()">Назад</button></div></div>
    <div id="m-car" class="modal"><div class="modal-box"><h3>Додати авто</h3><input id="car1" placeholder="Марка"><input id="car2" placeholder="Номер"><select id="car3"><option>В строю</option><option>Ремонт</option></select><button class="btn" style="width:100%" onclick="core.save('cars')">Зберегти</button><button class="btn" style="background:transparent; color:#64748b; width:100%; margin-top:10px;" onclick="core.cls()">Назад</button></div></div>
    <div id="m-crime" class="modal"><div class="modal-box"><h3>Внести порушення</h3><input id="cr1" placeholder="Хто порушив"><textarea id="cr2" placeholder="Суть"></textarea><button class="btn" style="width:100%" onclick="core.save('crime')">Записати</button><button class="btn" style="background:transparent; color:#64748b; width:100%; margin-top:10px;" onclick="core.cls()">Назад</button></div></div>
    <div id="m-criminal" class="modal"><div class="modal-box"><h3>Нове КП</h3><input id="crm1" placeholder="№ Справи"><input id="crm2" placeholder="Стаття"><input id="crm3" placeholder="Фігурант"><button class="btn btn-red" style="width:100%" onclick="core.save('criminal')">Створити справу</button><button class="btn" style="background:transparent; color:#64748b; width:100%; margin-top:10px;" onclick="core.cls()">Назад</button></div></div>

    <script>
        // ... (Тут іде весь JS код з версії 6.8, він працює ідеально) ...
        // Головне - функція cls() та openM(id) тепер працюють з новою CSS анімацією
        const core = {
            // ... (Firebase init та інші функції) ...
            openM(id) { document.getElementById(id).classList.add('active'); },
            cls() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); },
            // ... (Інша логіка) ...
        }
    </script>
</body>
</html>
